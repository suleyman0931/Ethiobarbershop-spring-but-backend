# ============================= Server =============================
server.port=${PORT:8080}

# ============================= SSL/TLS Configuration =============================
# Note: SSL/TLS is automatically handled by Railway.app hosting platform
# Railway provides automatic HTTPS with Let's Encrypt certificates
# The following configurations are for reference if deploying to a custom server

# Enable HTTPS (uncomment for custom server deployment with SSL certificate)
#server.ssl.enabled=true
#server.ssl.key-store=classpath:keystore.p12
#server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
#server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=tomcat

# SSL Protocol Configuration
#server.ssl.protocol=TLS
#server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# Redirect HTTP to HTTPS (uncomment if needed)
#server.ssl.require-ssl=true

# Current Deployment: Railway.app handles SSL/TLS automatically
# - Automatic HTTPS enforcement
# - Let's Encrypt certificates (auto-renewed)
# - TLS 1.2 and TLS 1.3 support
# - No manual SSL configuration required

# ============================= Database - Railway MySQL =============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:railway}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_ROOT_PASSWORD:${MYSQLPASSWORD:}}}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database SSL Configuration (optional - Railway internal network is already secured)
# To enable SSL for database connection, modify the URL:
# spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=true&requireSSL=true&verifyServerCertificate=true&serverTimezone=UTC
# For custom SSL certificates:
#spring.datasource.hikari.data-source-properties.useSSL=true
#spring.datasource.hikari.data-source-properties.requireSSL=true
#spring.datasource.hikari.data-source-properties.verifyServerCertificate=true

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ============================= JPA / Hibernate =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================= JWT =============================
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYXJiZXJzaG9wIGFwcA==}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# ============================= File Upload =============================
app.upload.dir=${UPLOAD_DIR:uploads/images}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================= Logging =============================
logging.level.org.springframework=INFO
logging.level.com.barbershop=DEBUG
logging.level.org.hibernate.SQL=DEBUG