[phases.setup]
nixPkgs = ["jdk17", "maven"]

[phases.install]
cmds = [
  "java -version",
  "mvn --version",
  "export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))"
]

[phases.build]
cmds = [
  "export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))",
  "mvn clean package -DskipTests",
  "ls -la target/"
]

[start]
cmd = "java -Dserver.port=${PORT:-8080} -Xmx512m -jar target/barbershop-backend-0.0.1-SNAPSHOT.jar"
