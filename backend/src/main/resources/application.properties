# Server
server.port=${PORT:8080}

# Database Configuration
# Railway MySQL provides MYSQL_URL in format: mysql://user:password@host:port/database
# We need to convert it to JDBC format or use individual components

# Option 1: Use MYSQL_URL directly (if it's in jdbc format)
# Option 2: Build from components (MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE)
# Option 3: Use DATABASE_URL if provided

# Try DATABASE_URL first (some Railway configs), then build from components, then local
spring.datasource.url=${DATABASE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:barbershop}}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings for Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYXJiZXJzaG9wIGFwcA==}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}
